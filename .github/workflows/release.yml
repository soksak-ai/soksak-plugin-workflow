name: release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out the exact source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.12.0"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - run: npm test
      - name: Build the release assets
        run: node scripts/build-release.mjs --commit "$GITHUB_SHA" --out dist
      - name: Bind publication to main and the exact checkout
        run: node scripts/release-context.mjs
      - name: Mint a least-privilege installation token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.SOKSAK_RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.SOKSAK_RELEASE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: soksak-plugin-workflow
          permission-administration: read
          permission-contents: write
      - name: Publish the verified owner manifest and assets
        env:
          SOKSAK_RELEASE_TOKEN: ${{ steps.release-token.outputs.token }}
        run: >-
          node scripts/publish-release.mjs
          --repository "$GITHUB_REPOSITORY"
          --commit "$GITHUB_SHA"
          --artifacts "$GITHUB_WORKSPACE/dist"
          --manifest "$GITHUB_WORKSPACE/dist/release.json"
